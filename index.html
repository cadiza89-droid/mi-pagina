<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pantalla 1 - Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="center">
    <section class="card" aria-labelledby="title">
      <h1 id="title">Ingresar</h1>

      <div id="errorBanner" class="banner hidden" role="alert" aria-live="assertive">
        Contraseña incorrecta. Intentá de nuevo.
      </div>

      <label class="label" for="password">Contraseña</label>
      <input
        id="password"
        class="input"
        type="password"
        placeholder="Escribí la contraseña"
        autocomplete="current-password"
      />

      <button id="btn" class="btn" type="button">Entrar</button>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
